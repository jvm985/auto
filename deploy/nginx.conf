# Initial host nginx vhost (HTTP only). Certbot rewrites this in-place
# to add the 443 server block and ACME challenge handling during
# server-setup.sh. The TLS version lives in deploy/nginx-proxy.conf.
server {
    listen 80;
    server_name auto.irishof.cloud;

    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
